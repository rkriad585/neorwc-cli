<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#131A28"/>
      <stop offset="100%" stop-color="#05070D"/>
    </radialGradient>

    <!-- Neon Gradients -->
    <linearGradient id="neonBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#008CFF"/>
    </linearGradient>

    <linearGradient id="neonPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#FF4DA6"/>
    </linearGradient>

    <linearGradient id="neonMix" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#00FFB3"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>

    <!-- Glow Effects -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowMix" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <title>Neorwc Neon Logo</title>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGlow)"/>

  <!-- Outer Ring -->
  <circle
    cx="256"
    cy="256"
    r="210"
    fill="none"
    stroke="#101722"
    stroke-width="22"
  />

  <circle
    cx="256"
    cy="256"
    r="210"
    fill="none"
    stroke="url(#neonMix)"
    stroke-width="3"
    opacity="0.9"
    filter="url(#glowMix)"
  />

  <!-- Main Icon Group -->
  <g>

    <!-- Left Bar -->
    <rect
      x="150"
      y="122"
      width="42"
      height="240"
      rx="21"
      fill="url(#neonBlue)"
      filter="url(#glowBlue)"
    />

    <!-- Right Bar -->
    <rect
      x="320"
      y="122"
      width="42"
      height="240"
      rx="21"
      fill="url(#neonPink)"
      filter="url(#glowPink)"
    />

    <!-- Center Diagonal -->
    <path
      d="M192 348 L320 190 V160 L192 318 Z"
      fill="url(#neonMix)"
      opacity="0.96"
      filter="url(#glowMix)"
    />

  </g>

  <!-- Top Diamond -->
  <g filter="url(#glowMix)">
    <polygon
      points="256,92 282,128 256,164 230,128"
      fill="#00FFB3"
    />

    <rect
      x="250"
      y="120"
      width="12"
      height="16"
      rx="3"
      fill="#05070D"
      opacity="0.35"
    />
  </g>

  <!-- Small Accent Dots -->
  <circle cx="120" cy="170" r="3" fill="#00E5FF" opacity="0.8"/>
  <circle cx="392" cy="170" r="3" fill="#FF006E" opacity="0.8"/>
  <circle cx="392" cy="340" r="2.5" fill="#00FFB3" opacity="0.85"/>
  <circle cx="120" cy="340" r="2.5" fill="#00E5FF" opacity="0.7"/>

  <!-- Brand Name -->
  <text
    x="256"
    y="436"
    text-anchor="middle"
    font-family="Inter, SF Pro Display, Arial, sans-serif"
    font-size="34"
    font-weight="800"
    letter-spacing="8"
    fill="#F5FBFF"
  >
    NEORWC
  </text>

  <!-- Subtitle -->
  <text
    x="256"
    y="466"
    text-anchor="middle"
    font-family="Inter, Arial, sans-serif"
    font-size="10"
    font-weight="600"
    letter-spacing="4"
    fill="#7B8797"
  >
    NEO • READ • WRITE • CREATE
  </text>
</svg>
