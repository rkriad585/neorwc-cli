<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D8FF"/>
      <stop offset="100%" stop-color="#00A3CC"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF0055"/>
      <stop offset="100%" stop-color="#CC0044"/>
    </linearGradient>
    <linearGradient id="gNeo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D8FF"/>
      <stop offset="40%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>
    <linearGradient id="gRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A3A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <title>Neorwc</title>
  <desc>Neo Read Write Create — AI-powered documentation suite</desc>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="248" fill="#0D1117" stroke="url(#gRing)" stroke-width="3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#1E2A3A" stroke-width="1" opacity="0.6"/>

  <!-- Left vertical bar — Read (Cyan) -->
  <rect x="120" y="96" width="48" height="280" rx="24" fill="url(#gCyan)"/>

  <!-- Right vertical bar — Write (Pink) -->
  <rect x="344" y="136" width="48" height="280" rx="24" fill="url(#gPink)"/>

  <!-- Diagonal cross bar — Create (Gradient) -->
  <path d="M168 376 L344 168 V136 L168 344 Z" fill="url(#gNeo)" opacity="0.85"/>

  <!-- Neo accent — diamond -->
  <polygon points="256,96 280,132 256,168 232,132" fill="#00FF99"/>
  <rect x="250" y="124" width="12" height="16" rx="2" fill="#0D1117" opacity="0.3"/>

  <!-- Brand name -->
  <text x="256" y="446" text-anchor="middle" font-family="'Inter','SF Pro','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" fill="#00D8FF" letter-spacing="8">
    neorwc
  </text>
  <text x="256" y="472" text-anchor="middle" font-family="'Inter','SF Pro','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#586069" letter-spacing="4">
    NEO · READ · WRITE · CREATE
  </text>
